<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="jdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C91623"/>
      <stop offset="50%" style="stop-color:#e60012"/>
      <stop offset="100%" style="stop-color:#ff2a3a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#c81623" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- JD购物袋图标 -->
  <g transform="translate(8,12)" filter="url(#shadow)">
    <rect x="2" y="10" width="44" height="38" rx="4" fill="url(#jdGrad)" opacity="0.95"/>
    <path d="M10 10 L10 6 C10 0 38 0 38 6 L38 10" fill="none" stroke="url(#jdGrad)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="24" cy="30" r="3" fill="#fff" opacity="0.5"/>
    <text x="24" y="18" text-anchor="middle" fill="#fff" font-family="Arial Black" font-size="14" font-weight="900">JD</text>
  </g>
  <!-- 京东文字 -->
  <text x="65" y="50" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="40" font-weight="900" fill="url(#jdGrad)" filter="url(#shadow)">京东</text>
  <!-- 创意商城副标题 -->
  <text x="67" y="66" font-family="Microsoft YaHei, sans-serif" font-size="10" fill="#c81623" font-weight="bold" letter-spacing="4" opacity="0.7">创意商城</text>
</svg>
